# Render.com Blueprint - Free Cron Job Deployment
# This file auto-configures the service on Render

services:
  - type: cron
    name: nse-algo-trader
    env: python
    schedule: "30 3 * * 1-5"  # 3:30 AM UTC = 9:00 AM IST, Mon-Fri
    buildCommand: pip install -r requirements.txt
    startCommand: python pythonanywhere_setup.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: TZ
        value: "Asia/Kolkata"
