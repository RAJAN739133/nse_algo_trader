# ============================================================
# NSE Algo Trader Configuration
# Copy this file to config.yaml and fill in your details
# ============================================================

zerodha:
  api_key: "YOUR_KITE_API_KEY"        # From https://developers.kite.trade
  api_secret: "YOUR_KITE_API_SECRET"
  # Access token is generated daily via login — handled by the code

capital:
  total: 10000           # Total capital in INR (₹10K starting capital)
  risk_per_trade: 0.02   # 2% max risk per trade (₹200 max per trade)
  max_trades_per_day: 3  # Conservative for small capital
  daily_loss_limit: 0.03 # 3% daily loss limit (₹300) — stop trading
  weekly_loss_limit: 0.07

# ── Stock Universe ──
# Options: nifty50, nifty100, nifty250, fno (full universe ~300 stocks)
# For intraday, 'fno' is recommended for maximum opportunities
universe: "fno"
top_stocks: 15           # Number of stocks to select for trading

trading:
  mode: "paper"          # "paper" or "live"
  start_time: "09:15"
  end_time: "15:15"
  square_off_time: "15:10"
  # Only trade these hours (skip 11:00-14:00 dead zone)
  active_windows:
    - ["09:15", "10:30"]
    - ["14:00", "15:10"]

strategies:
  orb:
    enabled: true
    orb_period_minutes: 30     # 30-min opening range (6 x 5-min candles)
    volume_multiplier: 1.5     # Entry needs 1.5x avg volume
    atr_stop_multiplier: 1.5   # Stop at 1.5x ATR
    trail_after_rr: 1.5        # Start trailing after 1.5x R
    partial_exit_rr: 1.0       # Book 50% at 1:1

  vwap:
    enabled: true
    entry_sigma: 2.0           # Entry at VWAP ± 2 sigma (stricter)
    stop_sigma: 1.0            # Tighter stop
    require_rsi: true          # Require RSI confirmation (< 25 or > 75)
    require_macd: true         # Require MACD turning
    require_volume_spike: true # Require 1.5x volume spike

  # ── NEW INTRADAY STRATEGIES ──
  ema_crossover:
    enabled: true
    fast_period: 9             # EMA 9 (~45 min for 5-min candles)
    slow_period: 21            # EMA 21 (~105 min)
    require_macd: true         # MACD confirmation
    
  bollinger_bands:
    enabled: true
    period: 20                 # 20 candles (~100 min)
    std_dev: 2.0               # 2 standard deviations
    max_bandwidth: 0.03        # Don't trade if bands > 3% (trending)
    require_reversal: true     # Require candle reversal pattern
    
  macd:
    enabled: true
    fast: 12                   # ~1 hour for 5-min candles
    slow: 26                   # ~2 hours
    signal: 9                  # ~45 min
    require_vwap: true         # Require price above/below VWAP
    
  momentum:
    enabled: true
    lookback: 8                # 8 candles (~40 min)
    min_change_pct: 0.5        # 0.5% minimum move

filters:
  min_avg_volume: 1000000      # 10L shares minimum avg daily volume
  max_gap_percent: 3.0         # Skip stocks gapping > 3%
  max_vix: 20                  # Reduce size if VIX > 20, skip if > 25
  vix_reduce_threshold: 20
  vix_skip_threshold: 25

# ══════════════════════════════════════════════════════════════
# PROFIT BOOKING SYSTEM - THE KEY TO PROFITABILITY!
# Backtest shows: Quick profit booking turns -3% into +1.7%
# ══════════════════════════════════════════════════════════════
strategy_tweaks:
  # Target and Stop (% from entry)
  target_pct: 0.012            # 1.2% target (exit if hit)
  stop_pct: 0.006              # 0.6% stop loss
  
  # QUICK PROFIT - Most important setting!
  # Book profit IMMEDIATELY when this threshold is hit
  # Don't wait for full target - "A bird in hand..."
  quick_profit_pct: 0.01       # 1.0% quick profit (book it!)
  
  # CUT LOSER - Exit losers early before they become big losses
  cut_loss_pct: 0.005          # 0.5% - cut losers fast
  
  # TRAILING STOP - Lock in profits as price moves
  trailing_activation_pct: 0.006  # Start trailing after 0.6% profit
  
  # TIME MANAGEMENT - Don't hold positions forever
  time_decay_candles: 20       # Max 20 candles (100 min) hold time
  
  # PARTIAL EXIT - Book some profits, let rest run
  partial_exit_at_rr: 1.0      # Take partial at 1:1 risk-reward
  partial_exit_pct: 0.5        # Exit 50% of position

alerts:
  telegram_enabled: false
  telegram_bot_token: "YOUR_BOT_TOKEN"     # From @BotFather on Telegram
  telegram_chat_id: "YOUR_CHAT_ID"         # From @userinfobot on Telegram

# ── Claude AI Brain ──
# Adaptive strategy adjustment powered by Claude API
# Every morning: analyses VIX, FII flows, news → adjusts risk level
# Every evening: reviews trades → suggests improvements
claude:
  enabled: true
  api_key: "YOUR_ANTHROPIC_API_KEY"
  # Get from: https://console.anthropic.com/settings/keys
  # Key starts with: sk-ant-api03-...
  # Cost: ~Rs 250-330/month (15-30 API calls/day)
