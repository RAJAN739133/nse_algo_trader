name: NSE Algo Trader

on:
  # Run at 9:00 AM IST (3:30 AM UTC) Monday-Friday
  schedule:
    - cron: '30 3 * * 1-5'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'paper'
        type: choice
        options:
          - paper
          - backtest

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 390  # 6.5 hours (full trading day)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check if trading day
        id: check_day
        run: |
          python -c "
          from datetime import date
          import sys
          
          # NSE Holidays 2026
          holidays = {
            '2026-01-26', '2026-03-03', '2026-03-26', '2026-03-31',
            '2026-04-03', '2026-04-14', '2026-05-01', '2026-05-28',
            '2026-06-26', '2026-08-19', '2026-10-02', '2026-10-20',
            '2026-10-22', '2026-11-05', '2026-12-25'
          }
          
          today = date.today()
          if today.weekday() >= 5:
            print('Weekend - skipping')
            sys.exit(1)
          if str(today) in holidays:
            print(f'Holiday - skipping')
            sys.exit(1)
          print(f'Trading day: {today}')
          "
        continue-on-error: true
      
      - name: Run trading bot
        if: steps.check_day.outcome == 'success'
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_PASSWORD: ${{ secrets.ANGEL_PASSWORD }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Starting trading bot at $(date)"
          python live_paper_v3.py --data-source yfinance
          echo "Trading completed at $(date)"
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-results-${{ github.run_number }}
          path: |
            results/*.csv
            logs/*.log
          retention-days: 30
      
      - name: Send Telegram notification
        if: always() && steps.check_day.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os
          import urllib.request
          import json
          from datetime import date
          from pathlib import Path
          
          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          
          if not token or not chat_id:
            print('Telegram not configured')
            exit(0)
          
          # Check results
          results_file = Path(f'results/live_v3_{date.today()}.csv')
          if results_file.exists():
            import pandas as pd
            df = pd.read_csv(results_file)
            trades = len(df)
            pnl = df['net_pnl'].sum() if 'net_pnl' in df.columns else 0
            msg = f'🤖 GitHub Actions Trading Complete\\n📅 {date.today()}\\n📊 Trades: {trades}\\n💰 PnL: ₹{pnl:+,.0f}'
          else:
            msg = f'🤖 GitHub Actions Trading Complete\\n📅 {date.today()}\\n📭 No trades today'
          
          try:
            data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
            req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'}
            )
            urllib.request.urlopen(req, timeout=10)
            print('Notification sent')
          except Exception as e:
            print(f'Notification failed: {e}')
          "
