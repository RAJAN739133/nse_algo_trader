# ════════════════════════════════════════════════════════════
# NSE ALGO TRADER — GitHub Actions Workflow
# ════════════════════════════════════════════════════════════
#
# This workflow runs the trading scheduler automatically:
# - Weekdays at 8:50 AM IST (before market open)
# - Can also be triggered manually
#
# Required Secrets (set in GitHub repo settings):
# - ANGEL_API_KEY
# - ANGEL_CLIENT_ID
# - ANGEL_PASSWORD
# - ANGEL_TOTP_SECRET
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHAT_ID
# - ANTHROPIC_API_KEY (for Claude Brain)
#
# ════════════════════════════════════════════════════════════

name: NSE Algo Trader

on:
  # Scheduled run - Weekdays at 8:50 AM IST (3:20 AM UTC)
  schedule:
    - cron: '20 3 * * 1-5'  # Mon-Fri at 3:20 UTC = 8:50 AM IST
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      mode:
        description: 'Trading mode'
        required: true
        default: 'paper'
        type: choice
        options:
          - paper
          - live
      backtest_date:
        description: 'Backtest date (YYYY-MM-DD) or leave empty for live'
        required: false
        default: ''

env:
  TZ: Asia/Kolkata

jobs:
  trading:
    name: Run Trading Session
    runs-on: ubuntu-latest
    timeout-minutes: 420  # 7 hours max (full trading day)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psutil
      
      - name: Create config from secrets
        run: |
          mkdir -p config
          cat > config/config_prod.yaml << EOF
          broker:
            angel_one:
              api_key: "${{ secrets.ANGEL_API_KEY }}"
              client_id: "${{ secrets.ANGEL_CLIENT_ID }}"
              password: "${{ secrets.ANGEL_PASSWORD }}"
              totp_secret: "${{ secrets.ANGEL_TOTP_SECRET }}"
            mode: "${{ github.event.inputs.mode || 'paper' }}"
            data_source: "angel_one"
          
          capital:
            total: 10000
            risk_per_trade: 0.02
            max_trades_per_day: 5
            daily_loss_limit: 0.02
          
          telegram:
            bot_token: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
            chat_ids:
              - "${{ secrets.TELEGRAM_CHAT_ID }}"
            enabled: true
          
          claude:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
            model: "claude-sonnet-4-20250514"
            max_calls_per_day: 50
          
          trading:
            start_time: "09:15"
            end_time: "15:15"
            square_off_time: "15:10"
          
          filters:
            vix_extreme_threshold: 30
          
          strategy_tweaks:
            target_pct: 0.012
            stop_pct: 0.005
            quick_profit_pct: 0.008
            cut_loss_pct: 0.003
            time_decay_candles: 16
          EOF
          
          # Also create symlink for config_test.yaml
          cp config/config_prod.yaml config/config_test.yaml
      
      - name: Create data directories
        run: |
          mkdir -p data logs results models
      
      - name: Check market holiday
        id: holiday_check
        run: |
          python << 'EOF'
          import sys
          from datetime import date
          
          # Check if today is a holiday (basic check)
          today = date.today()
          
          # NSE holidays 2026 (add more as needed)
          holidays = [
              date(2026, 1, 26),   # Republic Day
              date(2026, 3, 10),   # Holi
              date(2026, 3, 30),   # Id-ul-Fitr
              date(2026, 4, 6),    # Ram Navami
              date(2026, 4, 10),   # Good Friday
              date(2026, 4, 14),   # Dr. Ambedkar Jayanti
              date(2026, 4, 21),   # Mahavir Jayanti
              date(2026, 5, 1),    # May Day
              date(2026, 6, 7),    # Id-ul-Zuha
              date(2026, 7, 7),    # Muharram
              date(2026, 8, 15),   # Independence Day
              date(2026, 9, 5),    # Milad-un-Nabi
              date(2026, 10, 2),   # Gandhi Jayanti
              date(2026, 10, 20),  # Dussehra
              date(2026, 10, 21),  # Dussehra
              date(2026, 11, 9),   # Diwali
              date(2026, 11, 10),  # Diwali Balipratipada
              date(2026, 11, 16),  # Guru Nanak Jayanti
              date(2026, 12, 25),  # Christmas
          ]
          
          if today in holidays:
              print("Market holiday - skipping")
              sys.exit(1)
          
          if today.weekday() >= 5:  # Saturday or Sunday
              print("Weekend - skipping")
              sys.exit(1)
              
          print("Trading day - proceeding")
          sys.exit(0)
          EOF
        continue-on-error: true
      
      - name: Skip if holiday
        if: steps.holiday_check.outcome == 'failure'
        run: |
          echo "Skipping - Market closed today"
          exit 0
      
      - name: Run system test
        if: steps.holiday_check.outcome == 'success'
        run: |
          python test_system.py || echo "Some tests failed, continuing..."
      
      - name: Send start notification
        if: steps.holiday_check.outcome == 'success'
        run: |
          python << 'EOF'
          import requests
          import os
          from datetime import datetime
          
          bot_token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          
          if bot_token and chat_id:
              msg = f"""🚀 *Algo Trader Starting*
          
          📅 Date: {datetime.now().strftime('%Y-%m-%d')}
          ⏰ Time: {datetime.now().strftime('%H:%M:%S')} IST
          🤖 Mode: ${{ github.event.inputs.mode || 'paper' }}
          📍 Running on: GitHub Actions
          
          Trading session beginning..."""
              
              requests.post(
                  f"https://api.telegram.org/bot{bot_token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"}
              )
          EOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      - name: Run trading scheduler
        if: steps.holiday_check.outcome == 'success'
        run: |
          if [ -n "${{ github.event.inputs.backtest_date }}" ]; then
            echo "Running backtest for ${{ github.event.inputs.backtest_date }}"
            python live_paper_v3.py --backtest "${{ github.event.inputs.backtest_date }}"
          else
            echo "Running live trading session"
            python scheduler.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADING_ENV: prod
        timeout-minutes: 400
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_number }}
          path: |
            logs/
            results/
          retention-days: 30
      
      - name: Send completion notification
        if: always() && steps.holiday_check.outcome == 'success'
        run: |
          python << 'EOF'
          import requests
          import os
          from datetime import datetime
          from pathlib import Path
          
          bot_token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          
          if bot_token and chat_id:
              # Try to read today's results
              pnl_msg = "No trades today"
              results_dir = Path("results")
              if results_dir.exists():
                  csv_files = list(results_dir.glob("*.csv"))
                  if csv_files:
                      import pandas as pd
                      latest = max(csv_files, key=lambda x: x.stat().st_mtime)
                      try:
                          df = pd.read_csv(latest)
                          if len(df) > 0:
                              total_pnl = df['net_pnl'].sum() if 'net_pnl' in df.columns else 0
                              trades = len(df)
                              pnl_msg = f"Trades: {trades}, P&L: ₹{total_pnl:+,.2f}"
                      except:
                          pass
              
              status = "✅ Completed" if os.environ.get('JOB_STATUS') != 'failure' else "❌ Failed"
              
              msg = f"""📊 *Trading Session Ended*
          
          {status}
          📅 Date: {datetime.now().strftime('%Y-%m-%d')}
          ⏰ Time: {datetime.now().strftime('%H:%M:%S')} IST
          📈 {pnl_msg}
          
          Logs uploaded to GitHub Actions artifacts."""
              
              requests.post(
                  f"https://api.telegram.org/bot{bot_token}/sendMessage",
                  json={"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"}
              )
          EOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}

  # Separate job for weekly ML model retraining
  retrain:
    name: Weekly ML Retrain
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 18 * * 6'  # Saturday 6 PM UTC
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Retrain ML model
        run: |
          python -m ml.train_model --model-type lightgbm
      
      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-${{ github.run_number }}
          path: models/
          retention-days: 90
