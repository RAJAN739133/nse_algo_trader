name: NSE Algo Trader

on:
  schedule:
    - cron: '30 3 * * 1-5'  # 9:00 AM IST Mon-Fri
  
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check if trading day
        id: check_day
        run: |
          python << 'EOF'
          from datetime import date
          import sys
          
          holidays = {
            '2026-01-26', '2026-03-03', '2026-03-26', '2026-03-31',
            '2026-04-03', '2026-04-14', '2026-05-01', '2026-05-28',
            '2026-06-26', '2026-08-19', '2026-10-02', '2026-10-20',
            '2026-10-22', '2026-11-05', '2026-12-25'
          }
          
          today = date.today()
          if today.weekday() >= 5:
            print(f'SKIP: Weekend ({today})')
            print('is_trading_day=false')
          elif str(today) in holidays:
            print(f'SKIP: Holiday ({today})')
            print('is_trading_day=false')
          else:
            print(f'Trading day: {today}')
            print('is_trading_day=true')
          EOF
      
      - name: Setup config
        run: |
          mkdir -p config logs results
          cat > config/angel_config.yaml << EOF
          angel_one:
            api_key: "${{ secrets.ANGEL_API_KEY }}"
            client_code: "${{ secrets.ANGEL_CLIENT_CODE }}"
            pin: "${{ secrets.ANGEL_PIN }}"
            totp_secret: "${{ secrets.ANGEL_TOTP_SECRET }}"
          EOF
          
          cat > config/config_prod.yaml << EOF
          capital:
            total: 100000
            risk_per_trade: 0.01
            max_trades_per_day: 5
            daily_loss_limit: 0.03
          alerts:
            telegram_enabled: true
            telegram_bot_token: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
            telegram_chat_id: "${{ secrets.TELEGRAM_CHAT_ID }}"
          claude:
            enabled: true
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          EOF
      
      - name: Run trading bot
        run: |
          python << 'EOF'
          from datetime import date
          import subprocess
          import sys
          
          holidays = {
            '2026-01-26', '2026-03-03', '2026-03-26', '2026-03-31',
            '2026-04-03', '2026-04-14', '2026-05-01', '2026-05-28',
            '2026-06-26', '2026-08-19', '2026-10-02', '2026-10-20',
            '2026-10-22', '2026-11-05', '2026-12-25'
          }
          
          today = date.today()
          is_trading = today.weekday() < 5 and str(today) not in holidays
          
          if not is_trading:
            print(f"📅 {today} - Market closed (weekend/holiday)")
            print("✅ Skipping trading - this is expected behavior")
            sys.exit(0)  # Exit successfully
          
          print(f"🚀 Starting trading for {today}")
          result = subprocess.run(
            ["python", "live_paper_v3.py", "--universe", "nifty250", "--top", "20"],
            capture_output=False
          )
          sys.exit(result.returncode)
          EOF
      
      - name: Send Telegram notification
        if: always()
        run: |
          python << 'EOF'
          import os
          import urllib.request
          import json
          from datetime import date
          from pathlib import Path
          
          token = os.environ.get('TG_TOKEN', '')
          chat_ids_str = os.environ.get('TG_CHAT', '')
          
          if not token or not chat_ids_str:
            print("Telegram not configured")
            exit(0)
          
          # Support multiple chat IDs (comma-separated)
          chat_ids = [cid.strip() for cid in chat_ids_str.split(',') if cid.strip()]
          print(f"Sending to {len(chat_ids)} recipient(s)")
          
          today = date.today()
          holidays = {'2026-04-03'}  # Add more as needed
          
          if today.weekday() >= 5 or str(today) in holidays:
            msg = f"📅 {today}\n🚫 Market closed\n✅ Bot checked and skipped correctly"
          else:
            results_file = Path(f'results/live_v3_{today}.csv')
            if results_file.exists():
              import pandas as pd
              df = pd.read_csv(results_file)
              trades = len(df)
              pnl = df['net_pnl'].sum() if 'net_pnl' in df.columns else 0
              wins = len(df[df['net_pnl'] > 0]) if 'net_pnl' in df.columns else 0
              wr = wins/trades*100 if trades > 0 else 0
              msg = f"📊 Trading Report\n📅 {today}\n━━━━━━━━━━━━\n📋 Trades: {trades}\n✅ Win Rate: {wr:.0f}%\n💰 PnL: ₹{pnl:+,.0f}"
            else:
              msg = f"📊 {today}\n📭 No trades today"
          
          # Send to all chat IDs
          for chat_id in chat_ids:
            try:
              data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
              req = urllib.request.Request(
                f'https://api.telegram.org/bot{token}/sendMessage',
                data=data,
                headers={'Content-Type': 'application/json'}
              )
              urllib.request.urlopen(req, timeout=10)
              print(f"✅ Sent to {chat_id}")
            except Exception as e:
              print(f"❌ Failed for {chat_id}: {e}")
          EOF
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_number }}
          path: |
            results/
            logs/
          retention-days: 30
          if-no-files-found: ignore
